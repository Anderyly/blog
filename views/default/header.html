{{ define "default/header" }}

<!DOCTYPE html>
<!--[if lt IE 7 ]><html class="ie ie6" lang="zh-CN"><![endif]-->
<!--[if IE 7 ]><html class="ie ie7" lang="zh-CN"><![endif]-->
<!--[if IE 8 ]><html class="ie ie8" lang="zh-CN"><![endif]-->
<!--[if (gte IE 9)|!(IE)]><html lang="zh-CN"><![endif]-->
<html lang="zh-CN">
<head>
    <title>{{ .siteConf.title }}</title>
    <meta name="keywords" content="{{ .siteConf.keywords }}" />
    <meta name="description" content="{{ .siteConf.description }}" />
    <meta name="generator" content="anderyly" />
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <link rel='stylesheet' id='bootstrap-css'  href='//cdn.staticfile.org/twitter-bootstrap/3.1.1/css/bootstrap.min.css' type='text/css' media='all' />
    <link rel='stylesheet' id='fontawesome-css'  href='//cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.min.css' type='text/css' media='all' />
    <link rel='stylesheet' id='flexslider-css'  href='//cdn.staticfile.org/flexslider/2.7.0/flexslider.min.css' type='text/css' media='all' />
    <link rel='stylesheet' id='zan-css'  href='/static/templates/default/css/zan.css?ver=3.0.0' type='text/css' media='all' />
    <link rel="EditURI" type="application/rsd+xml" title="RSD" href="{{ .siteConf.web_url }}xmlrpc" />
    <link rel="wlwmanifest" type="application/wlwmanifest+xml" href="{{ .siteConf.web_url }}wlwmanifest" />
    <link rel="alternate" type="application/rss+xml" title="RSS"  href="{{ .siteConf.web_url }}rss" />
    <style type="text/css">
        a:hover{color:#428BCA}  .header,.panel.panel-zan .panel-heading,.label-zan,.slide-text,.day,.audiojs .scrubber .loaded,.zan-author .author-bottom{background-color:#428BCA}nav.navbar-inverse .navbar-nav li.current-menu-item>a,nav.navbar-inverse .navbar-nav li.current-menu-parent>a,.addcomment input{border-color:#428BCA}.header .logo.animation{box-shadow:#428bca 1px 1px;background-color:#428BCA}.article-stick,.post-info i,#reply-title,#related-title,.comments-header,.attachment a{color:#428BCA}.btn-zan-solid-pw,.btn-zan-solid-pi,.pagination-zan span{border:2px solid #428BCA;background-color:#428BCA}#reply-title,#related-title,.comments-header{border-bottom:2px solid #428BCA}#commentform #submit,.pager li>a,.btn-zan-line-pp,.btn-zan-line-pp .badge,.pagination-zan>a ,.addcomment #submit{color:#428BCA;border:2px solid #428BCA}#commentform #submit:hover,.pager li>a:hover,.login-form .input-group-addon,#commentform .input-group .input-group-addon,.pagination-zan>a:hover,.addcomment .input-group .input-group-addon{background-color:#428BCA;border:2px solid #428BCA}nav.navbar-inverse ul.dropdown-menu a:hover,.btn-zan-solid-ip:hover{background-color:#428BCA!important}nav.navbar-inverse .open a{border-bottom:3px solid #428BCA}nav.navbar-inverse .open a:hover{border-bottom:3px solid #428BCA}#commentform textarea:focus,#searchform input:focus,#commentform input,.attachment a,.form-control:focus,.btn-zan-line-pp:hover,.addcomment #submit,.btn-zan-solid-ip:hover{border:2px solid #428BCA}.attachment a:hover,.btn-zan-line-pp:hover .badge,.btn-zan-line-pp:hover,.top_post .title {background-color:#428BCA}
    </style>
    <style type="text/css">
        nav.navbar-inverse,.login-panel,.audiojs,.zan-link, .zan-copyright,.zan-author .author-top,#zan-gotop .gotop,.footer-space-line{background-color:#0b445b}#zan-gotop .gotop::before{border-right:13px solid #0b445b;}#zan-gotop .gotop::after{border-left:13px solid #0b445b}nav.navbar-inverse .open a:hover{background-color:#0b445b!important;}.zan-copyright:before{right:0;background-image:-webkit-linear-gradient(top left, #fff 50%, #0b445b 50%);background-image:linear-gradient(315deg, #fff 50%, #0b445b 50%);}.week,.day,.sun,.zan-category a:hover{background:#0b445b}.btn-zan-solid-ip{background-color: #0b445b;border: 2px solid #0b445b;}
    </style>
</head>
<body class="home blog">
<header id="zan-header">
    <!-- logo -->
    <div class="header">
        <div class="logo" data-toggle="animation"></div>
    </div>
    <!-- logo结束 -->
    <!-- 导航 -->
    <nav class="navbar navbar-inverse" id="zan-nav">
        <div class="container">
            <button class="navbar-toggle" type="button" data-toggle="collapse" data-target=".navbar-collapse">
                <span class="sr-only">下拉框</span>
                <span class="fa fa-reorder fa-lg"></span>
            </button>
            <div class="navbar-collapse collapse">
                <ul id="menu-navbar" class="nav navbar-nav">
                    <li id="menu-item" class="menu-item menu-item-type-post_type menu-item-object-page  current-menu-item current_page_item">
                        <a href="/">
                            <i class="fa fa-home"></i>首页</a>
                    </li>
                    {{ range $k,$v := ListCategory }}
                    <li id="menu-item" class="menu-item menu-item-type-post_type menu-item-object-page  ">
                        <a href="{{ GetCategoryLink $v.Slug }}"><i class="{{ $v.Icon }}"></i>{{ $v.Name }}</a>
                    </li>
                    {{ end }}
                </ul>
            </div>
        </div>
    </nav>
</header>

{{ end }}
